<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>function in js</h1>

    <script>
        // function.js

console.log("===== 1. Simple Function =====");

function greet() {
    console.log("Hello Gaurav!");
}

greet();

console.log("\n===== 2. Function with Parameters =====");

function add(a, b) {
    console.log("Sum =", a + b);
}

add(10, 20);

console.log("\n===== 3. Function with Return Value =====");

function multiply(a, b) {
    return a * b;
}

let result = multiply(5, 4);
console.log("Multiplication =", result);

console.log("\n===== 4. Function Expression =====");

const square = function (num) {
    return num * num;
};

console.log("Square =", square(6));

console.log("\n===== 5. Arrow Function =====");

const subtract = (a, b) => {
    return a - b;
};

console.log("Subtraction =", subtract(20, 8));

console.log("\n===== 6. Arrow Function (Short Form) =====");

const cube = num => num * num * num;

console.log("Cube =", cube(3));

console.log("\n===== 7. Default Parameters =====");

function welcome(name = "Guest") {
    console.log("Welcome", name);
}

welcome();
welcome("Gaurav");

console.log("\n===== 8. Anonymous Function =====");

setTimeout(function () {
    console.log("This is an Anonymous Function.");
}, 1000);
    </script>
</body>
</html>
